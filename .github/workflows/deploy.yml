name: Deploy Utility Bot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    
    steps:
      - name: Execute deployment commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          # You will need to add these secrets in your GitHub repository settings:
          # Settings -> Secrets and variables -> Actions -> New repository secret
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }} # usually 22
          
          # Replace 'YOUR_FOLDER_PATH_HERE' with your actual directory path on the server
          script: |
            set -e
            APP_DIR="/root/utilitybot"
            
            echo "Moving to application directory: $APP_DIR"
            cd $APP_DIR
            
            echo "Current Directory: $(pwd)"
            
            echo "Writing Instagram cookies securely if provided via Secrets..."
            if [ -n "${{ secrets.INSTAGRAM_COOKIES }}" ]; then
              echo "${{ secrets.INSTAGRAM_COOKIES }}" > cookies.txt
              chmod 600 cookies.txt
              echo "✅ cookies.txt generated successfully."
            fi
            
            echo "Pulling latest changes from GitHub..."
            git pull origin main
            
            echo "Latest Commit:"
            git log -1 --oneline
            
            echo "Updating dependencies..."
            ./venv/bin/pip install --upgrade pip
            ./venv/bin/pip install -r requirements.txt
            
            echo "Checking yt-dlp version..."
            ./venv/bin/pip show yt-dlp || echo "yt-dlp not found in venv!"
            
            echo "Restarting the utilitybot service..."
            sudo systemctl daemon-reload
            sudo systemctl restart utilitybot.service
            
            echo "Deployment completed successfully!"
